services:
  postgres:
    image: postgres:16-alpine
    container_name: langmigrate-postgres
    environment:
      POSTGRES_USER: langmigrate
      POSTGRES_PASSWORD: langmigrate
      POSTGRES_DB: langmigrate
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langmigrate"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - langmigrate_pgdata:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack:latest
    container_name: langmigrate-redis
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  langmigrate_pgdata:
